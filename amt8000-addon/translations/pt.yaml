configuration:
  host:
    name: "Endereço IP (Host)"
    description: "O endereço IP ou hostname da sua central de alarme Intelbras AMT-8000."
  port:
    name: "Porta"
    description: "A porta TCP para conexão (padrão da central: 9009)."
  password:
    name: "Senha da Central"
    description: "A senha numérica de 6 dígitos do usuário configurada na central de alarme."
  update_interval:
    name: "Intervalo de Atualização (segundos)"
    description: "Frequência de consulta de status da central de alarme pelo addon (padrão: 4 segundos)."
  zones:
    name: "Nomes Personalizados de Zonas"
    description: "Lista de zonas com seus respectivos nomes customizados para exibição (ex: número: 6, nome: Sala de Estar)."
  partitions:
    name: "Nomes Personalizados de Partições"
    description: "Lista de partições com seus respectivos nomes customizados para exibição (ex: número: 1, nome: Casa Principal)."
